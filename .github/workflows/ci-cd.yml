name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "pytest.ini"
      - "mysql/**"
      - "Dockerfile"
      - "docker-compose.staging.yml"
      - "nginx/staging.conf"
      - ".github/workflows/ci-cd.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "pytest.ini"
      - ".github/workflows/ci-cd.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/quantmate-api

# ---------------------------------------------------------------------------
# Stage 1: CI — Lint
# ---------------------------------------------------------------------------
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check (non-blocking, temporarily paused)
        run: ruff check app/ --output-format=github || true

      - name: Run ruff format check (non-blocking, temporarily paused)
        run: ruff format app/ --check --diff || true

# ---------------------------------------------------------------------------
# Stage 1: CI — Test (needs lint)
# ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system deps for compiled packages
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            build-essential gfortran libopenblas-dev liblapack-dev libatlas-base-dev \
            libffi-dev libssl-dev libxml2-dev libxslt1-dev python3-dev pkg-config

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run unit tests
        env:
          PYTHONPATH: .
          JWT_SECRET_KEY: ci-test-secret-key
          SECRET_KEY: ci-test-secret-key
          MYSQL_PASSWORD: ci-test-mysql-password
          DATABASE_URL: sqlite:///test.db
        run: pytest tests/unit/ -v --tb=short --junitxml=test-results.xml --timeout=300 -n 4 --dist loadfile

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

# ---------------------------------------------------------------------------
# Stage 2: Publish — Build & push Docker image to GHCR (only on main push)
# ---------------------------------------------------------------------------
  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image build metadata
        id: build_meta
        run: echo "image_build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          build-args: |
            IMAGE_BUILD_TIME=${{ steps.build_meta.outputs.image_build_time }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ---------------------------------------------------------------------------
# Stage 3: Deploy Staging (only after publish succeeds)
# ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: publish
    environment: staging
    steps:
      - uses: actions/checkout@v4

      # Push the latest docker-compose.staging.yml and nginx config to the server
      - name: Copy config files to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "docker-compose.staging.yml,nginx/staging.conf"
          target: /opt/quantmate
          strip_components: 0

      # Pull new image and rolling-restart backend services only.
      # The portal image is published by the portal repo and may not share this commit SHA.
      - name: Grant qlib DB access to quantmate user
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            # Ensure qlib database exists and quantmate user has access (idempotent)
            sudo mysql -e "CREATE DATABASE IF NOT EXISTS \`qlib\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; GRANT ALL PRIVILEGES ON \`qlib\`.* TO 'quantmate'@'%'; FLUSH PRIVILEGES;" 2>/dev/null \
              && echo "qlib grant applied" \
              || echo "qlib grant skipped (manual step may be required)"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: sha-${{ github.sha }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: GITHUB_OWNER,IMAGE_TAG
          script: |
            set -e
            cd /opt/quantmate

            echo "==> Pulling image tag: $IMAGE_TAG"
            GITHUB_OWNER=$GITHUB_OWNER IMAGE_TAG=$IMAGE_TAG \
              docker compose -f docker-compose.staging.yml pull api worker datasync

            echo "==> Rolling restart"
            if ! GITHUB_OWNER=$GITHUB_OWNER IMAGE_TAG=$IMAGE_TAG \
              docker compose -f docker-compose.staging.yml up -d api worker datasync; then
              echo "Compose restart hit a stale container reference, cleaning api/worker/datasync and retrying once"
              for name in \
                quantmate-api-1 \
                quantmate-worker-1 \
                quantmate-datasync-1; do
                docker rm -f "$name" >/dev/null 2>&1 || true
              done
              docker compose -f docker-compose.staging.yml rm -sf api worker datasync >/dev/null 2>&1 || true
              GITHUB_OWNER=$GITHUB_OWNER IMAGE_TAG=$IMAGE_TAG \
                docker compose -f docker-compose.staging.yml up -d api worker datasync
            fi

            echo "==> Waiting for API to become healthy"
            ok=0
            for i in $(seq 1 24); do
              if curl -sf http://localhost:8000/health >/dev/null; then
                ok=1
                break
              fi
              echo "Health check retry $i/24..."
              sleep 5
            done

            if [ "$ok" -ne 1 ]; then
              echo "API did not become healthy in time, printing container status and logs"
              docker compose -f docker-compose.staging.yml ps
              docker compose -f docker-compose.staging.yml logs --tail=200 api
              exit 1
            fi

            echo "Staging deploy successful: $IMAGE_TAG"

      # Post-deploy status check
      - name: Post-deploy health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            curl -sf http://localhost:8000/health | python3 -m json.tool
            docker compose -f /opt/quantmate/docker-compose.staging.yml ps
