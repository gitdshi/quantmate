name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - ".dockerignore"
      - ".env.example"
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "requirements.runtime.txt"
      - "pytest.ini"
      - "mysql/**"
      - "Dockerfile"
      - "rdagent-service/**"
      - "docker-compose.staging.yml"
      - "nginx/staging.conf"
      - ".github/workflows/ci-cd.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - ".dockerignore"
      - ".env.example"
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "requirements.runtime.txt"
      - "pytest.ini"
      - ".github/workflows/ci-cd.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/quantmate-api

# ---------------------------------------------------------------------------
# Stage 1: CI — Lint
# ---------------------------------------------------------------------------
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check (non-blocking, temporarily paused)
        run: ruff check app/ --output-format=github || true

      - name: Run ruff format check (non-blocking, temporarily paused)
        run: ruff format app/ --check --diff || true

# ---------------------------------------------------------------------------
# Stage 1: CI — Test (needs lint)
# ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system deps for compiled packages
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            build-essential gfortran libopenblas-dev liblapack-dev libatlas-base-dev \
            libffi-dev libssl-dev libxml2-dev libxslt1-dev python3-dev pkg-config

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run unit tests
        env:
          PYTHONPATH: .
          JWT_SECRET_KEY: ci-test-secret-key
          SECRET_KEY: ci-test-secret-key
          MYSQL_PASSWORD: ci-test-mysql-password
          DATABASE_URL: sqlite:///test.db
        run: pytest tests/unit/ -v --tb=short --junitxml=test-results.xml --timeout=300 -n 4 --dist loadfile

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

# ---------------------------------------------------------------------------
# Stage 2: Publish — Build & push Docker image to GHCR (only on main push)
# ---------------------------------------------------------------------------
  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image build metadata
        id: build_meta
        run: echo "image_build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          build-args: |
            IMAGE_BUILD_TIME=${{ steps.build_meta.outputs.image_build_time }}
            PIP_INDEX_URL=
            PIP_TRUSTED_HOST=
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=api-image
          cache-to: type=gha,mode=max,scope=api-image

# ---------------------------------------------------------------------------
# Stage 3: Deploy Staging (only after publish succeeds)
# ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: publish
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect rdagent rebuild requirement
        id: deploy_flags
        run: |
          rebuild_rdagent=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            rebuild_rdagent=true
          elif [ -n "${{ github.event.before }}" ] && \
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -Eq '^(rdagent-service/|docker-compose\.staging\.yml$)'; then
            rebuild_rdagent=true
          fi
          echo "rebuild_rdagent=$rebuild_rdagent" >> "$GITHUB_OUTPUT"

      - name: Prepare staging config bundle
        run: |
          mkdir -p .deploy_bundle/nginx .deploy_bundle/.github/scripts
          cp docker-compose.staging.yml .deploy_bundle/docker-compose.staging.yml
          cp .env.example .deploy_bundle/.env.example.incoming
          cp nginx/staging.conf .deploy_bundle/nginx/staging.conf
          cp .github/scripts/merge_env_from_example.py .deploy_bundle/.github/scripts/merge_env_from_example.py
          cp -R rdagent-service .deploy_bundle/rdagent-service

      # Push the latest docker-compose.staging.yml and nginx config to the server
      - name: Copy config files to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: ".deploy_bundle/docker-compose.staging.yml,.deploy_bundle/.env.example.incoming,.deploy_bundle/nginx/staging.conf,.deploy_bundle/.github/scripts/merge_env_from_example.py,.deploy_bundle/rdagent-service"
          target: /opt/quantmate
          strip_components: 1

      # Pull new image and rolling-restart backend services only.
      # The portal image is published by the portal repo and may not share this commit SHA.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: sha-${{ github.sha }}
          REBUILD_RDAGENT: ${{ steps.deploy_flags.outputs.rebuild_rdagent }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: GITHUB_OWNER,IMAGE_TAG,REBUILD_RDAGENT
          script: |
            set -e
            cd /opt/quantmate

            ENV_FILE=.env
            EXAMPLE_FILE=.env.example
            INCOMING_EXAMPLE_FILE=.env.example.incoming

            rebuild_env_from_example_if_needed() {
              if [ ! -f "$INCOMING_EXAMPLE_FILE" ]; then
                echo "==> No incoming .env.example provided; keeping existing env files"
                return
              fi

              example_changed=0
              if [ ! -f "$EXAMPLE_FILE" ] || ! cmp -s "$EXAMPLE_FILE" "$INCOMING_EXAMPLE_FILE"; then
                example_changed=1
              fi

              if [ "$example_changed" -eq 1 ] || [ ! -f "$ENV_FILE" ]; then
                echo "==> Regenerating .env from incoming .env.example"
                python3 .github/scripts/merge_env_from_example.py \
                  "$INCOMING_EXAMPLE_FILE" "$ENV_FILE" "$ENV_FILE.merged"
                mv "$ENV_FILE.merged" "$ENV_FILE"
              else
                echo "==> .env.example unchanged; keeping existing .env"
              fi

              mv "$INCOMING_EXAMPLE_FILE" "$EXAMPLE_FILE"
            }

            upsert_env_key() {
              key="$1"
              value="$2"
              if grep -q "^${key}=" "$ENV_FILE"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$ENV_FILE"
              else
                printf "\n%s=%s\n" "$key" "$value" >> "$ENV_FILE"
              fi
            }

            ensure_env_key() {
              key="$1"
              value="$2"
              if ! grep -q "^${key}=" "$ENV_FILE"; then
                printf "\n%s=%s\n" "$key" "$value" >> "$ENV_FILE"
              fi
            }

            require_env_key() {
              key="$1"
              if ! grep -q "^${key}=.\+" "$ENV_FILE"; then
                echo "Required key $key is missing or empty in $ENV_FILE"
                exit 1
              fi
            }

            print_disk_diagnostics() {
              echo "==> Filesystem usage"
              df -h || true
              echo "==> Docker disk usage"
              docker system df || true
            }

            IMAGE_SERVICES="api worker datasync datasync-backfill"
            ALL_SERVICES="api worker datasync datasync-backfill rdagent-service"

            cleanup_docker_artifacts() {
              echo "==> Pruning unused Docker data to recover disk space"
              docker system prune -af || true
              docker builder prune -af || true
              print_disk_diagnostics
            }

            restart_nginx() {
              echo "==> Restarting nginx to refresh upstream container IPs"
              docker restart quantmate_nginx >/dev/null
            }

            restart_services() {
              GITHUB_OWNER=$GITHUB_OWNER IMAGE_TAG=$IMAGE_TAG \
                docker compose -f docker-compose.staging.yml up -d $IMAGE_SERVICES

              if [ "$REBUILD_RDAGENT" = "true" ]; then
                echo "==> Rebuilding rdagent-service"
                GITHUB_OWNER=$GITHUB_OWNER IMAGE_TAG=$IMAGE_TAG \
                  docker compose -f docker-compose.staging.yml up -d --build rdagent-service
              else
                echo "==> Reusing existing rdagent-service image"
                GITHUB_OWNER=$GITHUB_OWNER IMAGE_TAG=$IMAGE_TAG \
                  docker compose -f docker-compose.staging.yml up -d rdagent-service
              fi
            }

            rebuild_env_from_example_if_needed
            ensure_env_key GITHUB_OWNER "$GITHUB_OWNER"
            require_env_key PORTAL_IMAGE_TAG
            print_disk_diagnostics

            echo "==> Pulling image tag: $IMAGE_TAG"
            if ! GITHUB_OWNER=$GITHUB_OWNER IMAGE_TAG=$IMAGE_TAG \
              docker compose -f docker-compose.staging.yml pull $IMAGE_SERVICES; then
              echo "Initial image pull failed; retrying once after Docker cleanup"
              cleanup_docker_artifacts
              GITHUB_OWNER=$GITHUB_OWNER IMAGE_TAG=$IMAGE_TAG \
                docker compose -f docker-compose.staging.yml pull $IMAGE_SERVICES
            fi

            echo "==> Stopping sync daemons before restart"
            GITHUB_OWNER=$GITHUB_OWNER IMAGE_TAG=$IMAGE_TAG \
              docker compose -f docker-compose.staging.yml stop datasync datasync-backfill || true

            echo "==> Releasing backfill lock before restart"
            if ! GITHUB_OWNER=$GITHUB_OWNER IMAGE_TAG=$IMAGE_TAG \
              docker compose -f docker-compose.staging.yml run --rm --no-deps api \
              python -c "from app.domains.extdata.dao.data_sync_status_dao import release_backfill_lock; release_backfill_lock()"
            then
              echo "Backfill lock release skipped; continuing with restart"
            fi

            echo "==> Rolling restart"
            if ! restart_services; then
              echo "Compose restart failed, cleaning staging backend services and retrying once"
              print_disk_diagnostics
              for name in \
                quantmate-api-1 \
                quantmate-worker-1 \
                quantmate-datasync-1 \
                quantmate-datasync-backfill-1 \
                quantmate-rdagent-service-1; do
                docker rm -f "$name" >/dev/null 2>&1 || true
              done
              docker compose -f docker-compose.staging.yml rm -sf $ALL_SERVICES >/dev/null 2>&1 || true
              cleanup_docker_artifacts
              restart_services
            fi

            echo "==> Waiting for API to become healthy"
            ok=0
            for i in $(seq 1 24); do
              if curl -sf http://localhost:8000/health >/dev/null; then
                ok=1
                break
              fi
              echo "Health check retry $i/24..."
              sleep 5
            done

            if [ "$ok" -ne 1 ]; then
              echo "API did not become healthy in time, printing container status and logs"
              docker compose -f docker-compose.staging.yml ps
              docker compose -f docker-compose.staging.yml logs --tail=200 api
              exit 1
            fi

            restart_nginx

            echo "==> Verifying proxied API health"
            curl -sf http://localhost/health >/dev/null

            echo "==> Persisting deployed image tag into .env"
            upsert_env_key GITHUB_OWNER "$GITHUB_OWNER"
            upsert_env_key IMAGE_TAG "$IMAGE_TAG"

            echo "Staging deploy successful: $IMAGE_TAG"

      # Post-deploy status check
      - name: Post-deploy health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            curl -sf http://localhost:8000/health | python3 -m json.tool
            docker compose -f /opt/quantmate/docker-compose.staging.yml ps
