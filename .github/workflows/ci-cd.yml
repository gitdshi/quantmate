name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - ".dockerignore"
      - ".env.example"
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "pytest.ini"
      - "mysql/**"
      - "Dockerfile"
      - "docker-compose.staging.yml"
      - "nginx/staging.conf"
      - ".github/workflows/ci-cd.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - ".dockerignore"
      - ".env.example"
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "pytest.ini"
      - ".github/workflows/ci-cd.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/quantmate-api

# ---------------------------------------------------------------------------
# Stage 1: CI — Lint
# ---------------------------------------------------------------------------
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check (non-blocking, temporarily paused)
        run: ruff check app/ --output-format=github || true

      - name: Run ruff format check (non-blocking, temporarily paused)
        run: ruff format app/ --check --diff || true

# ---------------------------------------------------------------------------
# Stage 1: CI — Test (needs lint)
# ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system deps for compiled packages
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            build-essential gfortran libopenblas-dev liblapack-dev libatlas-base-dev \
            libffi-dev libssl-dev libxml2-dev libxslt1-dev python3-dev pkg-config

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run unit tests
        env:
          PYTHONPATH: .
          JWT_SECRET_KEY: ci-test-secret-key
          SECRET_KEY: ci-test-secret-key
          MYSQL_PASSWORD: ci-test-mysql-password
          DATABASE_URL: sqlite:///test.db
        run: pytest tests/unit/ -v --tb=short --junitxml=test-results.xml --timeout=300 -n 4 --dist loadfile

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

# ---------------------------------------------------------------------------
# Stage 2: Publish — Build & push Docker image to GHCR (only on main push)
# ---------------------------------------------------------------------------
  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image build metadata
        id: build_meta
        run: echo "image_build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          build-args: |
            IMAGE_BUILD_TIME=${{ steps.build_meta.outputs.image_build_time }}
            PIP_INDEX_URL=
            PIP_TRUSTED_HOST=
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=api-image
          cache-to: type=gha,mode=max,scope=api-image

# ---------------------------------------------------------------------------
# Stage 3: Deploy Staging (only after publish succeeds)
# ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: publish
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure staging SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' '${{ secrets.STAGING_SSH_KEY }}' > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh-keyscan -H '${{ secrets.STAGING_HOST }}' >> ~/.ssh/known_hosts

      - name: Prepare staging config bundle
        run: |
          mkdir -p .deploy_bundle/nginx .deploy_bundle/.github/scripts
          cp docker-compose.staging.yml .deploy_bundle/docker-compose.staging.yml
          cp .env.example .deploy_bundle/.env.example.incoming
          cp nginx/staging.conf .deploy_bundle/nginx/staging.conf
          cp .github/scripts/merge_env_from_example.py .deploy_bundle/.github/scripts/merge_env_from_example.py
          cp .github/scripts/deploy_backend_staging.sh .deploy_bundle/.github/scripts/deploy_backend_staging.sh

      - name: Pre-deploy staging disk cleanup
        run: |
          ssh -i ~/.ssh/staging_key '${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}' '
            set -e
            docker system prune -af || true
            docker builder prune -af || true
            df -h /
            docker system df || true
          '

      # Push the latest docker-compose.staging.yml and nginx config to the server
      - name: Copy config files to staging server
        run: |
          ssh -i ~/.ssh/staging_key '${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}' '
            mkdir -p /opt/quantmate/nginx /opt/quantmate/.github/scripts
          '
          scp -i ~/.ssh/staging_key .deploy_bundle/docker-compose.staging.yml '${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/quantmate/docker-compose.staging.yml'
          scp -i ~/.ssh/staging_key .deploy_bundle/.env.example.incoming '${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/quantmate/.env.example.incoming'
          scp -i ~/.ssh/staging_key .deploy_bundle/nginx/staging.conf '${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/quantmate/nginx/staging.conf'
          scp -i ~/.ssh/staging_key .deploy_bundle/.github/scripts/merge_env_from_example.py '${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/quantmate/.github/scripts/merge_env_from_example.py'
          scp -i ~/.ssh/staging_key .deploy_bundle/.github/scripts/deploy_backend_staging.sh '${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/quantmate/.github/scripts/deploy_backend_staging.sh'

      # Pull new image and rolling-restart backend services only.
      # The portal image is published by the portal repo and may not share this commit SHA.
      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/staging_key '${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}' "
            set -e
            cd /opt/quantmate
            GITHUB_OWNER='${{ github.repository_owner }}' IMAGE_TAG='sha-${{ github.sha }}' \
              sh .github/scripts/deploy_backend_staging.sh
          "

      # Post-deploy status check
      - name: Post-deploy health check
        run: |
          ssh -i ~/.ssh/staging_key '${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}' '
            curl -sf http://localhost:8000/health | python3 -m json.tool
            df -h /
            docker system df || true
            docker compose -f /opt/quantmate/docker-compose.staging.yml ps
          '
