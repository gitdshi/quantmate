# Staging (pull-only) compose: no source code copy, no local builds.
# Usage:
#   export IMAGE_TAG=latest
#   export GITHUB_OWNER=gitdshi
#   docker login ghcr.io
#   docker compose --env-file .env.staging -f docker-compose.staging.pull.yml pull
#   docker compose --env-file .env.staging -f docker-compose.staging.pull.yml up -d

services:
  api:
    image: ghcr.io/${GITHUB_OWNER:-gitdshi}/tradermate-api:${IMAGE_TAG:-latest}
    container_name: tradermate_api
    restart: unless-stopped
    environment:
      - APP_NAME=TraderMate
      - APP_VERSION=1.0.0
      - DEBUG=false
      - APP_ENV=staging
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-tradermate}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TUSHARE_DATABASE=tushare
      - VNPY_DATABASE=vnpy
      - TUSHARE_DATABASE_URL=mysql+pymysql://${MYSQL_USER:-tradermate}:${MYSQL_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT:-3306}/tushare?charset=utf8mb4
      - VNPY_DATABASE_URL=mysql+pymysql://${MYSQL_USER:-tradermate}:${MYSQL_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT:-3306}/vnpy?charset=utf8mb4
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - JWT_SECRET_KEY=${SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - tradermate_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    image: ghcr.io/${GITHUB_OWNER:-gitdshi}/tradermate-api:${IMAGE_TAG:-latest}
    container_name: tradermate_worker
    restart: unless-stopped
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-tradermate}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TUSHARE_DATABASE=tushare
      - VNPY_DATABASE=vnpy
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DEBUG=false
    depends_on:
      redis:
        condition: service_healthy
    command: ["rq", "worker", "--url", "redis://redis:6379", "backtest", "optimization"]
    networks:
      - tradermate_network

  redis:
    image: redis:7-alpine
    container_name: tradermate_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tradermate_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5

  portal:
    image: ghcr.io/${GITHUB_OWNER:-gitdshi}/tradermate-portal:${IMAGE_TAG:-latest}
    container_name: tradermate_portal
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - tradermate_network

  nginx:
    image: nginx:stable-alpine
    container_name: tradermate_nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      portal:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tradermate_network

volumes:
  redis_data:
    driver: local

networks:
  tradermate_network:
    driver: bridge
