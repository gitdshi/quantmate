# QuantMate Staging 环境 Docker Compose 配置
# 使用方法: docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d

services:
  # QuantMate API Service (Staging 配置)
  api:
    image: ghcr.io/${GITHUB_OWNER:-gitdshi}/quantmate-api:${IMAGE_TAG:?IMAGE_TAG must be set in .env or environment}
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # App Settings
      - APP_NAME=QuantMate
      - APP_VERSION=1.0.0-snapshot
      - DEBUG=false              # Staging 禁用调试模式
      - APP_ENV=staging
      # MySQL Settings (使用专用用户)
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-quantmate}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      # Tushare Settings
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - TUSHARE_TOKEN_POINTS=${TUSHARE_TOKEN_POINTS:-2000}
      - TUSHARE_GRANTED_API_NAMES=${TUSHARE_GRANTED_API_NAMES:-}
      - SYNC_INIT_DEFAULT_START_DATE=${SYNC_INIT_DEFAULT_START_DATE:-}
      - TUSHARE_DATABASE=tushare
      - RDAGENT_LLM_MODEL=${RDAGENT_LLM_MODEL:-ollama/mistral:7b}
      - RDAGENT_SIDECAR_URL=http://rdagent-service:8001
      # Redis Settings
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # JWT Settings
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - JWT_SECRET_KEY=${SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=240
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      # CORS Settings (Staging 允许测试域名)
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","http://127.0.0.1:5173"]
    ports:
      - "8000:8000"  # Staging 暴露端口便于测试
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - quantmate_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Background Worker Service
  worker:
    image: ghcr.io/${GITHUB_OWNER:-gitdshi}/quantmate-api:${IMAGE_TAG:?IMAGE_TAG must be set in .env or environment}
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=staging
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-quantmate}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - TUSHARE_TOKEN_POINTS=${TUSHARE_TOKEN_POINTS:-2000}
      - TUSHARE_GRANTED_API_NAMES=${TUSHARE_GRANTED_API_NAMES:-}
      - SYNC_INIT_DEFAULT_START_DATE=${SYNC_INIT_DEFAULT_START_DATE:-}
      - TUSHARE_DATABASE=tushare
      - RDAGENT_SIDECAR_URL=http://rdagent-service:8001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORKER_DEFAULT_QUEUE_NAMES=backtest,optimization,default,low,rdagent
      - DEBUG=false
    command: ["python", "-m", "app.worker.service.run_worker"]
    networks:
      - quantmate_network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # Data sync daemon (runs scheduled ingest/backfill)
  datasync:
    image: ghcr.io/${GITHUB_OWNER:-gitdshi}/quantmate-api:${IMAGE_TAG:?IMAGE_TAG must be set in .env or environment}
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=staging
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-quantmate}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - TUSHARE_TOKEN_POINTS=${TUSHARE_TOKEN_POINTS:-2000}
      - TUSHARE_GRANTED_API_NAMES=${TUSHARE_GRANTED_API_NAMES:-}
      - SYNC_INIT_DEFAULT_START_DATE=${SYNC_INIT_DEFAULT_START_DATE:-}
      - TUSHARE_DATABASE=tushare
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DEBUG=false
      - RDAGENT_LLM_MODEL=${RDAGENT_LLM_MODEL:-ollama/mistral:7b}
    command: ["python", "-m", "app.datasync.scheduler", "--daemon"]
    networks:
      - quantmate_network
    restart: unless-stopped

  # Dedicated backfill loop for retryable sync_status work
  datasync-backfill:
    image: ghcr.io/${GITHUB_OWNER:-gitdshi}/quantmate-api:${IMAGE_TAG:?IMAGE_TAG must be set in .env or environment}
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=staging
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-quantmate}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - TUSHARE_TOKEN_POINTS=${TUSHARE_TOKEN_POINTS:-2000}
      - TUSHARE_GRANTED_API_NAMES=${TUSHARE_GRANTED_API_NAMES:-}
      - SYNC_INIT_DEFAULT_START_DATE=${SYNC_INIT_DEFAULT_START_DATE:-}
      - TUSHARE_DATABASE=tushare
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DEBUG=false
    command: ["python", "-m", "app.datasync.scheduler", "--backfill-loop"]
    networks:
      - quantmate_network
    restart: unless-stopped

  # RD-Agent sidecar used by worker factor-mining jobs
  rdagent-service:
    build:
      context: ./rdagent-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - RDAGENT_WORKSPACE=/tmp/rdagent_workspace
      - CHAT_MODEL=${RDAGENT_LLM_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://172.17.0.1:11434}
      - RDAGENT_OLLAMA_CHAT_MODEL=${RDAGENT_OLLAMA_CHAT_MODEL:-ollama/mistral:7b}
      - RDAGENT_OLLAMA_EMBEDDING_MODEL=${RDAGENT_OLLAMA_EMBEDDING_MODEL:-ollama/nomic-embed-text:latest}
      - LITELLM_CHAT_STREAM=${LITELLM_CHAT_STREAM:-false}
      - CONDA_DEFAULT_ENV=${CONDA_DEFAULT_ENV:-base}
      - RDAGENT_SERVICE_PORT=8001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - rdagent_workspace_data:/tmp/rdagent_workspace
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - quantmate_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Redis
  redis:
    image: redis:7-alpine
    container_name: quantmate_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1 --loglevel warning
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "6379:6379"  # Staging 暴露端口便于本地连接测试
    volumes:
      - redis_data:/data
    networks:
      - quantmate_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5

  # Frontend
  portal:
    image: ghcr.io/${GITHUB_OWNER:-gitdshi}/quantmate-portal:${PORTAL_IMAGE_TAG:?PORTAL_IMAGE_TAG must be set in .env or environment}
    container_name: quantmate_portal
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - quantmate_network


  # Nginx reverse proxy (single entrypoint for cloudflared)
  nginx:
    image: nginx:stable-alpine
    container_name: quantmate_nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      portal:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - quantmate_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  rdagent_workspace_data:
    driver: local

networks:
  quantmate_network:
    driver: bridge
